{% extends 'base.html' %}
{% block content %}
<section class="card login-card">
  <h3>Student Login</h3>
  <p class="hint">Login using your roll number and student password.</p>
  <form method="post" class="form-grid">
    <input type="text" name="roll_number" placeholder="Roll Number" required />
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit">Login as Student</button>
  </form>
  <p class="hint">Default password for seeded students: their roll number.</p>
  <hr />
  <p class="hint">Are you a teacher? <a href="{{ url_for('teacher_login') }}">Teacher login here</a>.</p>
</section>
{% endblock %}
